<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧑‍🍳 Mes Recettes (version statique)</title>
  <style>
    body{font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding:24px; background:#fafafa; color:#333;}
    h1{color:#222;font-size:2rem;}
    .link{padding:12px 18px;background:#4CAF50;color:#fff;border:none;border-radius:6px;font-size:1rem;margin:12px 0;cursor:pointer}
    .link:hover{background:#45a049;}
    .info{font-size:0.9rem;color:#666;margin-top:16px;}
  </style>
</head>
<body>
  <h1>Mes Recettes 🧑‍🍳</h1>
  <p><strong>Version statique (aucune JavaScript nécessaire)</strong></p>
  
  <div><button class="link" onclick="window.location='/recipes'" >📖 Voir les recettes</button></div>
  
  <div><button class="link" onclick="window.location='/api/ciqual/all'" >📚 Base Ciqual complète (JSON)</button></div>
  
  <p class="info">Version locale : <code>http://192.168.1.137:8000/fallback.html</code></p>
  
  <p style="margin-top:32px;font-size:0.88em;color:#888">Cette page s’affiche même si JavaScript est bloqué ou non supporté.</p>

  <!-- Stats serveur = injectées par Flask -->
  <script>const stats=fetch('/api/status').then(r=>r.json()).then(d=>{
    document.getElementById('stats').innerHTML=`<p><strong>Serveur :</strong> ${d.status} | <strong>Recettes :</strong>${d.recettes} | <strong>Up :</strong>${d.uptime.slice(0,19)}</p>`
  });</script>
  <div id="stats"></div>
</body>
</html>
